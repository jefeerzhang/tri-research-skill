name: python-package

on:
  push:
    branches: [master, refactor/slim-down]
  pull_request:
    branches: [master]

jobs:
  test:
    name: unittest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run state-machine unit tests
        run: |
          python -m unittest discover -s skills/tri-research/tests -v

      - name: Smoke: state_machine.sh wrapper
        run: |
          bash skills/tri-research/scripts/state_machine.sh --help

      - name: Smoke: validate_report.py --help
        run: |
          python skills/tri-research/scripts/validate_report.py --help

      - name: Verify all tests pass (zero-failure gate)
        run: |
          RESULT=$(python -m unittest discover -s skills/tri-research/tests 2>&1)
          # Pin to "Ran N tests" + zero "FAILED" markers — robust to tests
          # that print to stdout (which would otherwise pollute the tail
          # line and break a naive "tail -1 == OK" check).
          COUNT_LINE=$(echo "$RESULT" | grep -E '^Ran [0-9]+ tests' | head -1 || true)
          if [ -z "$COUNT_LINE" ]; then
            echo "::error::unittest did not report a test count (discover failed?)"
            echo "$RESULT" | tail -20
            exit 1
          fi
          if echo "$RESULT" | grep -E '^FAILED' > /dev/null; then
            echo "::error::unittest reported failures or errors"
            echo "$RESULT" | tail -20
            exit 1
          fi
          COUNT=$(echo "$COUNT_LINE" | awk '{print $2}')
          echo "OK: $COUNT tests passed, zero failures"
